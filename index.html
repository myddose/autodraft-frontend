<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autodraft AI Workspace</title>
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f0f11;
            --panel-bg: #1a1a1d;
            --border-color: #2c2c30;
            --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Left Sidebar --- */
        .sidebar-left {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-item {
            padding: 15px 20px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item:hover, .menu-item.active {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #8b5cf6;
        }

        /* --- Center Canvas Area --- */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-dark);
        }

        .workspace-header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background-color: var(--panel-bg);
        }

        .canvas-container {
            flex: 1;
            margin: 20px;
            background-color: #151518;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: auto;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 16px;
        }

        .generated-img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        /* --- Right Sidebar (Controls) --- */
        .sidebar-right {
            width: 300px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h3 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }

        .input-group label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
        }

        textarea:focus { outline: none; border-color: #8b5cf6; }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover { opacity: 0.9; }

        .status {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: -10px;
        }
    </style>
</head>
<body>

    <!-- Left Sidebar -->
    <aside class="sidebar-left">
        <div class="logo">Autodraft Studio</div>
        <div class="menu-item active"><i class="fas fa-layer-group"></i> Canvas</div>
        <div class="menu-item"><i class="fas fa-image"></i> Assets</div>
        <div class="menu-item"><i class="fas fa-users"></i> Characters</div>
        <div class="menu-item"><i class="fas fa-cog"></i> Settings</div>
    </aside>

    <!-- Main Canvas -->
    <main class="main-workspace">
        <header class="workspace-header">
            <div style="font-weight: 500;">Untitled Project</div>
            <button style="background: transparent; border: 1px solid var(--border-color); color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer;">
                <i class="fas fa-download"></i> Export
            </button>
        </header>
        
        <div class="canvas-container" id="canvasArea">
            <div class="placeholder-text" id="placeholder">
                <i class="fas fa-magic" style="margin-right: 8px;"></i> Generate an image to place it on canvas
            </div>
        </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="sidebar-right">
        <div>
            <h3>Generation Settings</h3>
            <div class="input-group">
                <label>Prompt</label>
                <textarea id="promptInput" rows="5" placeholder="E.g., A futuristic cyberpunk city, neon lights, 4k..."></textarea>
            </div>
        </div>

        <button class="btn-primary" onclick="generateToCanvas()">
            <i class="fas fa-bolt"></i> Generate Image
        </button>

        <div id="statusMsg" class="status"></div>
    </aside>

    <script>
        async function generateToCanvas() {
            const prompt = document.getElementById("promptInput").value;
            const canvas = document.getElementById("canvasArea");
            const placeholder = document.getElementById("placeholder");
            const status = document.getElementById("statusMsg");

            if(!prompt) return alert("Please enter a prompt first!");

            status.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Generating...";

            try {
                // Backend ko call kar rahe hain
                const response = await fetch("https://autodraft-backend.onrender.com/api/ai/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if(data.imageUrl) {
                    // Canvas clear karein
                    if(placeholder) placeholder.style.display = "none";
                    
                    // Purani image hata kar nayi lagayein (Abhi ke liye replace kar rahe hain)
                    canvas.innerHTML = `<img src="${data.imageUrl}" class="generated-img" alt="Canvas Image">`;
                    status.innerHTML = "<span style='color: #4ade80;'>Image placed on canvas!</span>";
                } else {
                    status.innerHTML = "<span style='color: #ff6b6b;'>Failed to generate.</span>";
                }
            } catch (error) {
                status.innerHTML = "<span style='color: #ff6b6b;'>Error connecting to server.</span>";
            }
        }
    </script>
</body>
</html>
