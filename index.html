<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Autodraft</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #bb86fc; }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            background: #1e1e1e;
            color: white;
        }
        button {
            padding: 12px 24px;
            background: #bb86fc;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        #imageResult { margin-top: 20px; }
        img { max-width: 300px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1>AI Autodraft</h1>
    <input type="text" id="promptInput" placeholder="Describe the image you want...">
    <button onclick="generateImage()">Generate Image</button>

    <div id="imageResult"></div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById("promptInput").value;
            const resultDiv = document.getElementById("imageResult");
            
            if(!prompt) return alert("Please enter a prompt!");

            resultDiv.innerHTML = "<p>Generating, please wait...</p>";

            try {
                const response = await fetch("https://autodraft-backend.onrender.com/api/ai/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                
                if(data.imageUrl) {
                    resultDiv.innerHTML = `<img src="${data.imageUrl}" alt="Generated AI Image">`;
                } else {
                    resultDiv.innerHTML = "<p>Failed to generate image.</p>";
                }
            } catch (error) {
                resultDiv.innerHTML = "<p>Error connecting to server.</p>";
            }
        }
    </script>
</body>
</html>
