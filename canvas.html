<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autodraft Canvas Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #161616;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- TOP BAR --- */
        .topbar {
            height: 50px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .back-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
        .project-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .project-meta { font-size: 9px; color: var(--text-muted); position: absolute; top: 35px; }

        .ratio-selector {
            background-color: #232323;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-right { display: flex; align-items: center; gap: 16px; color: var(--text-muted); font-size: 14px; }
        .export-btn { background-color: var(--accent-blue); color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        /* --- CANVAS WORKSPACE --- */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #121212;
            overflow: hidden;
        }

        /* Fabric.js wrapper styling */
        .canvas-container {
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* --- TIMELINE AREA --- */
        .timeline {
            height: 120px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .timeline-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid #252525;
            font-size: 11px;
            color: var(--text-muted);
        }

        .play-controls { display: flex; gap: 16px; font-size: 14px; align-items: center; }
        .play-controls .fa-play { color: white; }

        .track-area {
            flex: 1;
            padding: 10px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            overflow-x: auto;
        }

        .scene-box { background: white; color: black; font-size: 12px; padding: 4px 12px; border-radius: 4px; font-weight: 500; }
        .add-scene { background: transparent; border: 1px dashed #666; color: #666; font-size: 12px; padding: 4px 12px; border-radius: 4px; }

        /* --- BOTTOM TOOLS --- */
        .bottom-tools {
            height: 60px;
            background-color: #000000;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            overflow-x: auto;
            padding: 0 16px;
        }

        ::-webkit-scrollbar { display: none; }

        .b-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 10px;
            cursor: pointer;
            position: relative;
            min-width: 50px;
        }
        .b-tool:hover { color: white; }
        .b-tool i { font-size: 16px; }

        .ai-badge::after {
            content: 'AI';
            position: absolute;
            top: -4px;
            right: 0px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 7px;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <i class="fas fa-magic" style="color: #eab308; font-size: 14px;"></i>
            <div style="position: relative;">
                <div class="project-title"><span id="projTitle">New Project</span> <i class="fas fa-pen" style="font-size: 10px; color: #666;"></i></div>
                <div class="project-meta">v7.9.2.9 IN &nbsp; Ultra Low Mode <i class="fas fa-caret-down"></i></div>
            </div>
        </div>

        <div class="ratio-selector">
            <i id="ratioIcon" class="fas fa-desktop"></i> <span id="ratioText">16:9</span> <i class="fas fa-caret-down"></i>
        </div>

        <div class="topbar-right">
            <i class="fas fa-history"></i>
            <i class="fas fa-save"></i>
            <button class="export-btn"><i class="fas fa-download"></i></button>
            <span style="font-size: 9px; margin-left: 8px; cursor: pointer;" onclick="clearCanvas()">Clear All <i class="fas fa-redo"></i></span>
        </div>
    </header>

    <main class="workspace" id="workspaceContainer">
        <canvas id="mainCanvas"></canvas>
    </main>

    <div class="timeline">
        <div class="timeline-controls">
            <div><i class="far fa-copy"></i> Duplicate &nbsp; <i class="fas fa-cut"></i> Split</div>
            <div class="play-controls">
                <i class="fas fa-step-backward"></i>
                <i class="fas fa-play"></i>
                <i class="fas fa-film"></i>
                <i class="fas fa-step-forward"></i>
            </div>
            <div>00:36 &nbsp; 1x <i class="fas fa-forward"></i> &nbsp; <i class="fas fa-undo"></i></div>
        </div>
        <div class="track-area">
            <div class="scene-box">Scene1 <i class="fas fa-ellipsis-v" style="margin-left:8px; color:#999;"></i></div>
            <div class="add-scene">+ New Scene</div>
        </div>
    </div>

    <div class="bottom-tools">
        <div class="b-tool"><i class="fas fa-walking"></i><span>Character</span></div>
        <div class="b-tool"><i class="fas fa-folder-open"></i><span>Media</span></div>
        <div class="b-tool"><i class="fas fa-clapperboard"></i><span>Templates</span></div>
        <div class="b-tool ai-badge" onclick="generateAIImage()"><i class="fas fa-image"></i><span>Image Gen</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-video"></i><span>Video Gen</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-microphone"></i><span>AI Voice</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-user-astronaut"></i><span>AI Character</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-photo-video"></i><span>AI Thumbnail</span></div>
        <div class="b-tool"><i class="fas fa-box-open"></i><span>Asset Library</span></div>
        <div class="b-tool"><i class="fas fa-font"></i><span>Text</span></div>
    </div>

    <script>
        // 1. URL Params Handling
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Untitled Project';
        const ratio = params.get('ratio') || '16:9';
        
        document.getElementById('projTitle').innerText = title;
        document.getElementById('ratioText').innerText = ratio;
        
        // 2. Initialize Fabric.js Canvas
        let canvasWidth = 800;
        let canvasHeight = 450;

        if (ratio === '9:16') {
            document.getElementById('ratioIcon').className = 'fas fa-mobile-alt';
            canvasWidth = 350;
            canvasHeight = 622;
        }

        const canvas = new fabric.Canvas('mainCanvas', {
            width: canvasWidth,
            height: canvasHeight,
            backgroundColor: '#ffffff'
        });

        // 3. Delete Object using Keyboard (Backspace/Delete)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObject = canvas.getActiveObject();
                if (activeObject && activeObject.type !== 'i-text') { // Prevent deleting while typing
                    canvas.remove(activeObject);
                }
            }
        });

        // Clear All
        function clearCanvas() {
            if(confirm("Clear entire canvas?")) {
                canvas.clear();
                canvas.backgroundColor = '#ffffff';
            }
        }

        // 4. Generate AI Image (Using your Pollinations Backend logic)
        async function generateAIImage() {
            const prompt = window.prompt("What do you want to generate? (e.g., A futuristic city)");
            if (!prompt) return;

            // Optional: Show loading state
            const loadingText = new fabric.Text('Generating...', {
                left: canvas.width / 2 - 50,
                top: canvas.height / 2 - 20,
                fontSize: 20,
                fill: '#666'
            });
            canvas.add(loadingText);

            try {
                // Using the Pollinations free API you set up earlier
                const response = await fetch("https://autodraft-backend.onrender.com/api/ai/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                
                if (data.imageUrl) {
                    fabric.Image.fromURL(data.imageUrl, function(img) {
                        // Scale image to fit reasonably on canvas
                        img.scaleToWidth(300);
                        img.set({
                            left: canvas.width / 2 - 150,
                            top: canvas.height / 2 - (img.getScaledHeight() / 2)
                        });
                        canvas.remove(loadingText);
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    }, { crossOrigin: 'anonymous' });
                }
            } catch (error) {
                alert("Generation failed. Please try again.");
                canvas.remove(loadingText);
            }
        }
    </script>
</body>
</html>
