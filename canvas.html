<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autodraft Pro Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root {
            --bg-base: #0f0f11;
            --bg-panel: #18181b;
            --bg-hover: #27272a;
            --border-dim: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- 1. TOP NAVBAR --- */
        .topbar {
            height: 50px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .tb-left { display: flex; align-items: center; gap: 16px; }
        .back-btn { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; }
        .proj-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .ratio-badge { background: var(--bg-base); padding: 4px 10px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border-dim); }

        .tb-right { display: flex; align-items: center; gap: 16px; color: var(--text-muted); font-size: 14px; }
        .export-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; }

        /* --- 2. MAIN LAYOUT (SIDEBARS + CANVAS) --- */
        .main-area {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Left Panel (Layers & Assets) */
        .side-panel {
            width: 240px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        
        .panel-header { padding: 12px 16px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border-dim); color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        .layer-item { padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .layer-item:hover { background-color: var(--bg-hover); }

        /* Canvas Workspace */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #121212;
            position: relative;
            overflow: auto; /* Allows panning if canvas is huge */
        }
        
        .canvas-container-wrapper {
            box-shadow: 0 12px 40px rgba(0,0,0,0.8);
            transition: all 0.2s ease;
        }

        /* --- 3. TIMELINE --- */
        .timeline {
            height: 120px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
        }

        .tl-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-dim);
            font-size: 12px;
            color: var(--text-muted);
        }

        .play-group { display: flex; gap: 16px; font-size: 16px; align-items: center; color: var(--text-main); }
        .track-area { flex: 1; padding: 10px; display: flex; gap: 10px; overflow-x: auto; }
        .scene-box { background: white; color: black; font-size: 12px; padding: 4px 12px; border-radius: 4px; font-weight: 600; }

        /* --- 4. BOTTOM TOOLS --- */
        .bottom-tools {
            height: 65px;
            background-color: #000;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 16px;
            overflow-x: auto;
            border-top: 1px solid var(--border-dim);
        }

        .bottom-tools::-webkit-scrollbar, .track-area::-webkit-scrollbar { display: none; }

        .b-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 10px;
            min-width: 55px;
            cursor: pointer;
            position: relative;
        }
        .b-tool:hover { color: white; }
        .b-tool i { font-size: 18px; }

        .ai-badge::after {
            content: 'AI';
            position: absolute;
            top: -6px;
            right: 0px;
            background-color: var(--accent);
            color: white;
            font-size: 7px;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* --- RESPONSIVE MOBILE LAYOUT --- */
        @media (max-width: 768px) {
            .side-panel { display: none; } /* Hide left layers panel on phone */
            .tb-right .fa-history, .tb-right .fa-save { display: none; } /* Hide extra icons */
            .timeline { height: 90px; }
            .tl-controls span { display: none; } /* Hide text in timeline controls */
            .b-tool { min-width: 60px; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="tb-left">
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <i class="fas fa-magic" style="color: #eab308;"></i>
            <div class="proj-title"><span id="projTitle">New Project</span></div>
        </div>
        
        <div class="ratio-badge">
            <i id="ratioIcon" class="fas fa-desktop"></i> <span id="ratioText">16:9</span>
        </div>

        <div class="tb-right">
            <i class="fas fa-history"></i>
            <i class="fas fa-save"></i>
            <i class="fas fa-layer-group" style="color: white;"></i> <button class="export-btn"><i class="fas fa-download"></i></button>
        </div>
    </header>

    <div class="main-area">
        
        <aside class="side-panel">
            <div class="panel-header">Layers</div>
            <div class="layer-item"><i class="fas fa-image"></i> Background</div>
            <div class="layer-item"><i class="fas fa-font"></i> Main Title</div>
            <div class="layer-item"><i class="fas fa-user"></i> AI Character 1</div>
        </aside>

        <main class="workspace" id="workspaceContainer">
            <div class="canvas-container-wrapper">
                <canvas id="mainCanvas"></canvas>
            </div>
        </main>
    </div>

    <div class="timeline">
        <div class="tl-controls">
            <span><i class="far fa-copy"></i> Duplicate &nbsp; <i class="fas fa-cut"></i> Split</span>
            <div class="play-group">
                <i class="fas fa-step-backward" style="font-size:14px; color:#888;"></i>
                <i class="fas fa-play-circle"></i>
                <i class="fas fa-step-forward" style="font-size:14px; color:#888;"></i>
            </div>
            <span>00:00 &nbsp; 1x <i class="fas fa-forward"></i></span>
        </div>
        <div class="track-area">
            <div class="scene-box">Scene 1 <i class="fas fa-ellipsis-v" style="margin-left:8px; color:#999;"></i></div>
            <div style="color: #666; font-size: 12px; padding: 4px 12px; border: 1px dashed #666; border-radius: 4px; display:flex; align-items:center;">+ New Scene</div>
        </div>
    </div>

    <div class="bottom-tools">
        <div class="b-tool"><i class="fas fa-mouse-pointer"></i><span>Select</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-image"></i><span>Image Gen</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-video"></i><span>Video Gen</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-user-astronaut"></i><span>AI Char</span></div>
        <div class="b-tool"><i class="fas fa-font"></i><span>Text</span></div>
        <div class="b-tool"><i class="fas fa-shapes"></i><span>Shapes</span></div>
        <div class="b-tool"><i class="far fa-folder-open"></i><span>Media</span></div>
        <div class="b-tool"><i class="fas fa-music"></i><span>Audio</span></div>
        <div class="b-tool"><i class="fas fa-magic"></i><span>Effects</span></div>
        <div class="b-tool"><i class="fas fa-trash"></i><span>Delete</span></div>
    </div>

    <script>
        // Data extraction from URL
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Untitled Project';
        const ratio = params.get('ratio') || '16:9';
        
        document.getElementById('projTitle').innerText = title;
        document.getElementById('ratioText').innerText = ratio;
        
        // Responsive Canvas Initialization
        let canvas;
        
        function initCanvas() {
            // Get available workspace width and height
            const workspace = document.getElementById('workspaceContainer');
            const availableWidth = workspace.clientWidth - 40; // 40px padding
            const availableHeight = workspace.clientHeight - 40;

            let targetWidth, targetHeight;

            // Calculate exact dimensions based on selected ratio
            if (ratio === '9:16') {
                document.getElementById('ratioIcon').className = 'fas fa-mobile-alt';
                targetHeight = availableHeight > 600 ? 600 : availableHeight;
                targetWidth = targetHeight * (9 / 16);
            } else {
                document.getElementById('ratioIcon').className = 'fas fa-desktop';
                targetWidth = availableWidth > 800 ? 800 : availableWidth;
                targetHeight = targetWidth * (9 / 16);
            }

            // Init Fabric.js
            canvas = new fabric.Canvas('mainCanvas', {
                width: targetWidth,
                height: targetHeight,
                backgroundColor: '#ffffff'
            });
        }

        // Initialize on load
        window.onload = initCanvas;

        // Auto-resize canvas when window size changes (Responsive support)
        window.addEventListener('resize', () => {
            if(canvas) {
                canvas.dispose(); // destroy old canvas
                initCanvas(); // recreate with new dimensions
            }
        });

        // Delete active object with keyboard
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObj = canvas.getActiveObject();
                if (activeObj && activeObj.type !== 'i-text') {
                    canvas.remove(activeObj);
                }
            }
        });
    </script>
</body>
</html>
