<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autodraft Canvas Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --bg-timeline: #181818;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --accent-blue: #3b82f6;
            --icon-dim: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- 1. TOP BAR (Based on mobile/desktop hybrid screenshot) --- */
        .topbar {
            height: 55px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .tb-left { display: flex; align-items: center; gap: 20px; }
        .tb-left i { font-size: 18px; color: var(--text-main); cursor: pointer; }
        .icon-yellow { color: #eab308 !important; } /* Siren/Light icon */

        .tb-right { display: flex; align-items: center; gap: 20px; }
        .tb-right i { font-size: 18px; color: var(--text-main); cursor: pointer; }
        .btn-export {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .meta-bar {
            display: flex;
            justify-content: space-between;
            padding: 4px 16px;
            font-size: 11px;
            color: var(--text-muted);
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
        }

        /* --- 2. MAIN WORKSPACE (CANVAS) --- */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            position: relative;
            overflow: hidden;
        }

        /* --- 3. TIMELINE & CONTROLS --- */
        .timeline-section {
            background-color: var(--bg-timeline);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        /* Row 1: Playback & Zoom */
        .tl-row-1 {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 24px;
        }
        .time-display { font-size: 14px; font-weight: 500; min-width: 50px; }
        .playback-controls { display: flex; align-items: center; gap: 16px; font-size: 18px; color: var(--text-muted); }
        .play-btn { font-size: 28px; color: var(--text-main); }
        .zoom-controls { display: flex; align-items: center; gap: 16px; font-size: 16px; color: var(--text-main); margin-left: auto; }

        /* Row 2: Secondary Tools */
        .tl-row-2 {
            display: flex;
            align-items: center;
            padding: 0 16px 12px;
            gap: 20px;
            color: var(--icon-dim);
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .tl-row-2 i { cursor: pointer; transition: color 0.2s; }
        .tl-row-2 i:hover { color: var(--text-main); }
        .speed-control { display: flex; align-items: center; gap: 4px; font-size: 12px; }
        .tl-divider { width: 1px; height: 16px; background-color: var(--border-color); }
        .flex-spacer { flex: 1; }

        /* Row 3: Scene Tabs */
        .scene-tabs {
            display: flex;
            align-items: center;
            background-color: #222222;
            padding-right: 16px;
        }
        .scroll-arrow { padding: 10px 12px; color: var(--text-muted); cursor: pointer; }
        .active-scene {
            background-color: #ffffff;
            color: #000000;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 4px 4px 0 0;
            margin-top: 4px;
        }
        .add-scene {
            color: var(--text-muted);
            font-size: 13px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Row 4: Timeline Ruler */
        .tl-ruler {
            height: 24px;
            background-color: #2a2a2a;
            display: flex;
            align-items: flex-end;
            padding-left: 16px;
            font-size: 10px;
            color: var(--text-muted);
            border-bottom: 1px solid #111;
        }
        .tick { flex: 1; border-left: 1px solid #555; padding-left: 4px; height: 12px; }
        .tick.major { height: 20px; border-left: 1px solid #888; }
        
        .track-empty { height: 80px; background-color: #111111; }

        /* --- 4. BOTTOM TOOLS BAR --- */
        .bottom-tools {
            height: 75px;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            gap: 24px;
            overflow-x: auto;
            padding: 0 20px;
            border-top: 1px solid var(--border-color);
        }

        .bottom-tools::-webkit-scrollbar { display: none; } /* Hide scrollbar */

        .b-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            position: relative;
            min-width: 60px;
            transition: color 0.2s;
        }
        .b-tool:hover { color: white; }
        .b-tool i { font-size: 20px; }

        /* Pixel-perfect AI Badge */
        .ai-badge::after {
            content: 'AI';
            position: absolute;
            top: -6px;
            right: 0px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="tb-left">
            <i class="fas fa-arrow-left" onclick="window.location.href='index.html'"></i>
            <i class="fas fa-cog"></i>
            <i class="fas fa-lightbulb icon-yellow"></i>
        </div>
        <div class="tb-right">
            <i class="fas fa-history"></i>
            <i class="fas fa-save"></i>
            <i class="fas fa-image"></i>
            <button class="btn-export"><i class="fas fa-download"></i></button>
        </div>
    </header>
    <div class="meta-bar">
        <span>v79.3.0 &nbsp;&nbsp; IN</span>
        <span id="projectIdDisplay">16709911</span>
    </div>

    <main class="workspace">
        <canvas id="mainCanvas"></canvas>
    </main>

    <section class="timeline-section">
        
        <div class="tl-row-1">
            <div class="time-display">00:00</div>
            <div class="playback-controls">
                <i class="fas fa-step-backward"></i>
                <i class="fas fa-play-circle play-btn"></i>
                <i class="fas fa-film"></i>
                <i class="fas fa-step-forward"></i>
            </div>
            <div class="zoom-controls">
                <i class="fas fa-search-minus"></i>
                <i class="fas fa-search-plus"></i>
                <i class="fas fa-redo"></i>
            </div>
        </div>

        <div class="tl-row-2">
            <i class="far fa-copy"></i>
            <i class="fas fa-cut"></i>
            <i class="fas fa-video"></i>
            <div class="tl-divider"></div>
            <div class="speed-control">1x <i class="fas fa-forward"></i></div>
            <div class="tl-divider"></div>
            <i class="fas fa-undo"></i>
            <i class="fas fa-redo"></i>
            <div class="tl-divider"></div>
            <i class="fas fa-minus"></i>
            <i class="fas fa-plus"></i>
            <div class="flex-spacer"></div>
            <i class="fas fa-expand"></i>
        </div>

        <div class="scene-tabs">
            <i class="fas fa-chevron-left scroll-arrow"></i>
            <div class="active-scene">Scene1 <i class="fas fa-ellipsis-v" style="color: #666;"></i></div>
            <div class="add-scene"><i class="fas fa-plus"></i> New Scene</div>
            <div class="flex-spacer"></div>
            <i class="fas fa-chevron-right scroll-arrow"></i>
        </div>

        <div class="tl-ruler">
            <div class="tick major">0</div>
            <div class="tick"></div><div class="tick"></div>
            <div class="tick major">10</div>
            <div class="tick"></div><div class="tick"></div>
            <div class="tick major">20</div>
            <div class="tick"></div><div class="tick"></div>
            <div class="tick major">30</div>
            <div class="tick"></div>
        </div>
        <div class="track-empty"></div>

    </section>

    <div class="bottom-tools">
        <div class="b-tool"><i class="fas fa-running"></i><span>Character</span></div>
        <div class="b-tool"><i class="far fa-folder-open"></i><span>Media</span></div>
        <div class="b-tool"><i class="fas fa-clapperboard"></i><span>Templates</span></div>
        <div class="b-tool ai-badge" onclick="triggerAIGeneration()"><i class="fas fa-image"></i><span>Image Gen</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-video"></i><span>Video Gen</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-microphone-alt"></i><span>AI Voice</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-user-astronaut"></i><span>AI Character</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-photo-video"></i><span>AI Thumbnail</span></div>
        <div class="b-tool"><i class="fas fa-box-open"></i><span>Asset Library</span></div>
        <div class="b-tool ai-badge"><i class="fas fa-magic"></i><span>AI Prop</span></div>
        <div class="b-tool"><i class="fas fa-atom"></i><span>Effects</span></div>
        <div class="b-tool"><i class="fas fa-wave-square"></i><span>Sounds</span></div>
        <div class="b-tool"><i class="fas fa-music"></i><span>Music</span></div>
        <div class="b-tool"><i class="fas fa-walking"></i><span>Anim IK</span></div>
        <div class="b-tool"><i class="fas fa-font"></i><span>Text</span></div>
        <div class="b-tool"><i class="fas fa-play-circle"></i><span>Tutorials</span></div>
    </div>

    <script>
        // Set dynamic data from URL (if coming from dashboard)
        const params = new URLSearchParams(window.location.search);
        const ratio = params.get('ratio') || '16:9';
        
        // Random Project ID generation to match UI
        document.getElementById('projectIdDisplay').innerText = Math.floor(10000000 + Math.random() * 90000000);

        // Initialize Fabric.js
        let canvasWidth = 720;
        let canvasHeight = 405; // 16:9 Default

        if (ratio === '9:16') {
            canvasWidth = 280;
            canvasHeight = 497;
        }

        const canvas = new fabric.Canvas('mainCanvas', {
            width: canvasWidth,
            height: canvasHeight,
            backgroundColor: '#ffffff'
        });

        // Allow deleting objects
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObj = canvas.getActiveObject();
                if (activeObj && activeObj.type !== 'i-text') {
                    canvas.remove(activeObj);
                }
            }
        });

        // Trigger AI Generation connected to Pollinations backend
        async function triggerAIGeneration() {
            const prompt = window.prompt("Enter your prompt for Image Gen:");
            if (!prompt) return;

            // Show loading
            const loadingText = new fabric.Text('Generating AI Image...', {
                left: canvas.width / 2 - 100,
                top: canvas.height / 2 - 15,
                fontSize: 20,
                fill: '#666',
                fontFamily: 'Segoe UI'
            });
            canvas.add(loadingText);

            try {
                const response = await fetch("https://autodraft-backend.onrender.com/api/ai/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                
                if (data.imageUrl) {
                    fabric.Image.fromURL(data.imageUrl, function(img) {
                        img.scaleToWidth(canvasWidth * 0.6); // Scale to 60% of canvas width
                        img.set({
                            left: canvas.width / 2 - (img.getScaledWidth() / 2),
                            top: canvas.height / 2 - (img.getScaledHeight() / 2)
                        });
                        canvas.remove(loadingText);
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    }, { crossOrigin: 'anonymous' });
                }
            } catch (error) {
                alert("Generation Failed. Backend might be sleeping.");
                canvas.remove(loadingText);
            }
        }
    </script>
</body>
</html>
